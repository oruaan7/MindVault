<mv-card>

  <div class="stat-card">

    <div class="stat-card__icon">

      <mat-icon>

        {{ icon }}

      </mat-icon>

    </div>

    <div class="stat-card__content">

      <span class="stat-card__title">

        {{ title }}

      </span>

      <span class="stat-card__value">

        {{ value }}

      </span>

      <span class="stat-card__subtitle">

        {{ subtitle }}

      </span>

    </div>

  </div>

</mv-card>
