<div class="dashboard-container">

    <mv-topbar title="Dashboard" />

    <section class="stats-section">

        <mv-stat-card
            title="Hábitos"
            [value]="stats.habits"
            subtitle="Total de hábitos"
            icon="task_alt" />

        <mv-stat-card
            title="Metas"
            [value]="stats.goals"
            subtitle="Metas ativas"
            icon="flag" />

        <mv-stat-card
            title="Projetos"
            [value]="stats.projects"
            subtitle="Projetos cadastrados"
            icon="folder" />

        <mv-stat-card
            title="Notas"
            [value]="stats.notes"
            subtitle="Notas armazenadas"
            icon="description" />

    </section>

    <section class="quick-actions-section">

        <mv-quick-actions />

    </section>

    <section class="dashboard-widgets">

        <mv-today-habits
            [habits]="habits" />

        <mv-goal-progress
            [goals]="goals" />

    </section>

</div>
