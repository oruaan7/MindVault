<section class="page">

    <header class="page-header">

        <div>

            <h1>

                Hábitos

            </h1>

            <p>

                Gerencie seus hábitos diários.

            </p>

        </div>

    </header>

    @if (loading()) {

        <div class="loading">

            Carregando hábitos...

        </div>

    } @else {

        @if (habits().length === 0) {

            <div class="empty-state">

                Nenhum hábito encontrado.

            </div>

        } @else {

            <div class="grid">

                @for (habit of habits(); track habit.id) {

                    <app-habit-card
                        [habit]="habit">
                    </app-habit-card>

                }

            </div>

        }

    }

</section>
