<form [formGroup]="form" (ngSubmit)="login()">

    <div class="field">

        <label>Email</label>

        <input
            type="email"
            formControlName="email">

    </div>

    <div class="field">

        <label>Senha</label>

        <input
            type="password"
            formControlName="password">

    </div>

    @if (authState.error()) {

        <p class="error">

            {{ authState.error() }}

        </p>

    }

    <button
        type="submit"
        [disabled]="authState.loading()">

        @if (authState.loading()) {

            Entrando...

        } @else {

            Entrar

        }

    </button>

</form>
