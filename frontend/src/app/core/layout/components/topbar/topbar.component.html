<header class="topbar">

  <div class="topbar__content">

    <div class="topbar__titles">

      <h1>{{ title }}</h1>

      @if (subtitle) {

        <p>{{ subtitle }}</p>

      }

    </div>

    <div class="topbar__actions">

      <button
        type="button"
        class="icon-button"
        aria-label="Pesquisar">

        <mat-icon>search</mat-icon>

      </button>

      <button
        type="button"
        class="icon-button"
        aria-label="Notificações">

        <mat-icon>notifications</mat-icon>

      </button>

      <div class="avatar">

        RS

      </div>

    </div>

  </div>

</header>
