services:
  postgres:
    image: postgres:17

    container_name: mindvault-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: mindvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindvault"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
